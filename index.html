<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>

<style>
  .word-of-the-week {
  padding:10px;
  border-radius: 15px;
  height: 250px;
  width: 500px;
  background-color: white;
  border: 10px solid transparent;
  background-image: linear-gradient(white, white), linear-gradient(to top left, #504aff, #000ea8);
  background-origin: border-box;
  background-clip: padding-box, border-box;
  }
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-image: linear-gradient(to bottom right, #9819ff, #c073ff);
    
  }

  .center { 
    display: flex;
    width: 100%;
    justify-content: center;
    text-align: center;
   align-items: center;    
  }

  input {
    padding: 12px;
    width: 750px;
    font-size: 16px;
    border-radius: 50px;
  }

  button {
    padding: 12px 16px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>

<body>
<main>
<div class="center">
<h1 style="font-size: 50px; padding: 50px;">Edodnan dictionary - good dictionary</h1>
</div>
<div class="center">
  <input type="text" id="searchInput" placeholder="Try asking: extraterrestrial" />
  <button onclick="goSearch()">Learn</button>
</div>
<div style="padding: 50px 10px;"><div class="word-of-the-week"> 
<h1 style="color:blue">Word of the week</h1>
<h2>Elongated</h2>
<p style="font-style: italic;"> E/long/ga/ted </p>
<p>To make something longer; usually by using brute force.</p>
</div></div>
</main>
<script>
function goSearch() {
  let value = document.getElementById("searchInput").value;

  // remove ALL spaces
  value = value.replace(/\s+/g, "");

  // optional: make lowercase
  value = value.toLowerCase();

  if (value !== "") {
    window.location.href = "/r/" + value + ".html";
  }
}

// allow Enter key
document.getElementById("searchInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    goSearch();
  }
});
</script>

</body>
</html>
